version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: babyguardian-postgres-dev
    environment:
      POSTGRES_DB: babyguardian_dev
      POSTGRES_USER: babyguardian
      POSTGRES_PASSWORD: babyguardian_dev_2024
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: babyguardian-redis-dev
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
