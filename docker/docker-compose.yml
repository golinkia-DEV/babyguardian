version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: babyguardian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: babyguardian
      POSTGRES_USER: babyguardian
      POSTGRES_PASSWORD: babyguardian_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babyguardian"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: babyguardian-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: babyguardian-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://babyguardian:babyguardian_secret_2024@postgres:5432/babyguardian
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_change_in_production
      FCM_SERVER_KEY: your_fcm_key_here
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
