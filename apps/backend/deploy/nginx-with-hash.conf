# =============================================================================
# BabyGuardian - Nginx con Validación de Hash
#
# Este archivo configura nginx para:
# 1. Solo permitir requests con X-App-Hash correcto
# 2. Redirigir HTTP a HTTPS automáticamente
# 3. Usar certificados SSL Let's Encrypt
# 4. Aplicar rate limiting y seguridad
#
# La app debe enviar el header:
#   X-App-Hash: 7d8f3a2c9e1b4f5a6c8d9e0f1a2b3c4d
#   (El hash debe ser una string de 32 caracteres hex)
# =============================================================================

# Variables que nginx vuelve a cargar
# Estas permiten cambiar el hash sin reiniciar nginx
geo $valid_app_hash {
    default 0;
}

# Mapa de hashes válidos
# Agrega todos los hashes de las apps que quieras permitir
map $http_x_app_hash $app_hash_valid {
    default                      0;
    "7d8f3a2c9e1b4f5a6c8d9e0f1a2b3c4d"  1;  # Producción
    "test_hash_local_dev_1a2b3c4d5e6f"   1;  # Desarrollo local
}

# Redirigir HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name babyguardian.golinkia.com;

    # Permitir verificación de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo a HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - Servidor principal con validación de hash
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name babyguardian.golinkia.com;

    # ==========================================================================
    # CERTIFICADOS SSL
    # ==========================================================================
    ssl_certificate /etc/letsencrypt/live/babyguardian.golinkia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babyguardian.golinkia.com/privkey.pem;

    # Configuración SSL mejorada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ==========================================================================
    # LOGGING
    # ==========================================================================
    access_log /var/log/nginx/babyguardian-access.log combined;
    error_log /var/log/nginx/babyguardian-error.log warn;

    # Log de requests rechazadas
    access_log /var/log/nginx/babyguardian-rejected.log combined if=$invalid_hash;

    # ==========================================================================
    # GZIP COMPRESSION
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ==========================================================================
    # VALIDAR HASH EN TODOS LOS REQUESTS
    # ==========================================================================

    # Variable que marca si el hash es inválido
    set $invalid_hash 0;

    # Rutas PÚBLICAS (no requieren hash)
    # - Health check (para monitoreo)
    # - Swagger docs (documentación)
    location ~ ^/(health|api/docs|api-json)$ {
        # Estas rutas no validan hash
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Rutas PRIVADAS (requieren hash válido)
    location / {
        # Validar que el header X-App-Hash sea correcto
        if ($app_hash_valid = 0) {
            set $invalid_hash 1;
            return 401;
        }

        # Si el hash es válido, proceder normalmente
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-App-Hash $http_x_app_hash;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Rate limiting para auth
    location ~ ^/api/v1/auth/(login|register|refresh) {
        if ($app_hash_valid = 0) {
            set $invalid_hash 1;
            return 401;
        }

        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-App-Hash $http_x_app_hash;
    }

    # Página de error 401 personalizada
    error_page 401 =401 @error_401;
    location @error_401 {
        default_type application/json;
        return 401 '{"error": "Unauthorized - Invalid or missing X-App-Hash header", "code": "INVALID_APP_HASH"}';
    }
}

# =============================================================================
# RATE LIMITING
# =============================================================================

# Define zonas de rate limiting
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# =============================================================================
# UPSTREAM (backend)
# =============================================================================

upstream babyguardian_backend {
    server 127.0.0.1:3000;
    keepalive 32;
    keepalive_requests 100;
}
